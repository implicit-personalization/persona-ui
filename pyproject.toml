[project]
name = "persona-ui"
version = "0.1.0"
description = "Streamlit UI for persona-vectors"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "persona-vectors",
    "persona-data",
    "streamlit>=1.44.0",
    "plotly>=6.6.0",
    "python-dotenv>=1.2.2",
]

[tool.uv.sources]
persona-vectors = { path = "../persona-vectors", editable = true }
persona-data = { path = "../persona-data", editable = true }
