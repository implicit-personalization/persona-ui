[project]
name = "persona-ui"
version = "0.1.0"
description = "Streamlit UI for persona-vectors"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "persona-vectors>=0.1.0",
    "persona-data>=0.1.0",
    "streamlit>=1.44.0",
    "plotly>=6.6.0",
    "python-dotenv>=1.2.2",
    "transformers>=5.5.0",
]


[tool.uv.sources]
# Local development:
# persona-data = { path = "../persona-data", editable = true }
persona-vectors = { path = "../persona-vectors", editable = true }
persona-data = { git = "https://github.com/implicit-personalization/persona-data.git" }

